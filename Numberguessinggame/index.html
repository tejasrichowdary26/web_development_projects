<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guess The Number</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="card">
    <h1>Guess the Number</h1>
    <p class="subtitle">I'm thinking of a number between 1 and 100</p>

    <div class="info-row">
      <div class="info-box">
        <div class="label">Attempts</div>
        <div class="value" id="attempts">0</div>
      </div>
      <div class="info-box">
        <div class="label">Range</div>
        <div class="value" id="range">1 – 100</div>
      </div>
    </div>

    <div class="hint" id="hint">Enter your first guess below 👇</div>

    <div class="input-row">
      <input type="number" id="guessInput" min="1" max="100" placeholder="Your guess…" />
      <button class="btn-guess" id="guessBtn" onclick="makeGuess()">Guess</button>
    </div>

    <button class="btn-reset" onclick="resetGame()">↺ New Game</button>

    <div id="historySection">
      <div class="history-title">Previous Guesses</div>
      <div class="history-list" id="historyList"></div>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
